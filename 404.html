<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, follow"/>
  <title>Page Not Found — BizSoft Solutions</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1b2a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;overflow:hidden;position:relative}
    canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
    .content{position:relative;z-index:1}
    .num{font-size:clamp(6rem,20vw,12rem);font-weight:900;line-height:1;background:linear-gradient(135deg,#1565c0,#ff6f00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(255,111,0,.4));margin-bottom:1rem}
    h1{font-size:clamp(1.3rem,3vw,2rem);font-weight:700;margin-bottom:.75rem;color:#e0e0e0}
    p{color:#90a4ae;max-width:460px;margin:0 auto 2rem;font-size:.97rem;line-height:1.6}
    .btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:2.5rem}
    .btn{padding:.8rem 1.8rem;border-radius:8px;font-weight:700;font-size:.95rem;text-decoration:none;transition:.2s}
    .btn-home{background:#1565c0;color:#fff}
    .btn-home:hover{background:#0d47a1}
    .btn-search{background:transparent;color:#ff6f00;border:2px solid #ff6f00}
    .btn-search:hover{background:#ff6f00;color:#fff}
    .sw-links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
    .sw-link{color:#90a4ae;text-decoration:none;font-size:.85rem;padding:.4rem .9rem;border:1px solid #263238;border-radius:6px;transition:.2s}
    .sw-link:hover{color:#fff;border-color:#fff}
    .timer{color:#607d8b;font-size:.8rem;margin-top:1.5rem}
    #countdown{color:#ff6f00;font-weight:700}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="content">
  <div class="num">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <div class="btns">
    <a href="/index.html" class="btn btn-home">🏠 Go Home</a>
    <a href="/index.html#lead" class="btn btn-search">📞 Free Consultation</a>
  </div>
  <div class="sw-links">
    <a href="/Vyapar_index.html" class="sw-link">Vyapar</a>
    <a href="/BizAnalyst_index.html" class="sw-link">Biz Analyst</a>
    <a href="/Biltouch_index.html" class="sw-link">Bill Touch</a>
  </div>
  <p class="timer">Redirecting to home in <span id="countdown">10</span> seconds…</p>
</div>
<script>
// Particles
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d"),W,H,particles=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener("resize",resize);
for(var i=0;i<80;i++){particles.push({x:Math.random()*1920,y:Math.random()*1080,r:Math.random()*2+.5,dx:(Math.random()-.5)*.4,dy:(Math.random()-.5)*.4,o:Math.random()*.5+.2})}
function draw(){ctx.clearRect(0,0,W,H);particles.forEach(function(p){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle="rgba(21,101,192,"+p.o+")";ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>W)p.dx*=-1;if(p.y<0||p.y>H)p.dy*=-1});requestAnimationFrame(draw)}
draw();
// Countdown
var n=10,el=document.getElementById("countdown");
var t=setInterval(function(){n--;el.textContent=n;if(n<=0){clearInterval(t);window.location.href="/index.html"}},1000);
// Smart routing
var path=window.location.pathname.toLowerCase();
if(path.indexOf("vyapar")>-1)window.location.replace("/Vyapar_index.html");
else if(path.indexOf("biz")>-1||path.indexOf("analyst")>-1)window.location.replace("/BizAnalyst_index.html");
else if(path.indexOf("bill")>-1||path.indexOf("touch")>-1||path.indexOf("restaurant")>-1)window.location.replace("/Biltouch_index.html");
</script>
</body>
</html>
