<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | BizSoft Solutions</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#1565c0;--dark:#0d1b2a;--muted:#607d8b;--white:#fff;--light:#f4f7fb}
    body{font-family:'Segoe UI',Arial,sans-serif;background:var(--dark);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;overflow:hidden}

    /* ── Floating particles ── */
    .particles{position:fixed;inset:0;pointer-events:none;z-index:0}
    .particle{position:absolute;border-radius:50%;opacity:.15;animation:float linear infinite}
    @keyframes float{
      0%{transform:translateY(100vh) scale(0)}
      100%{transform:translateY(-100px) scale(1)}
    }

    /* ── 404 Number ── */
    .num-404{
      position:relative;z-index:1;
      font-size:clamp(7rem,20vw,14rem);font-weight:900;line-height:1;
      background:linear-gradient(135deg,#1565c0,#42a5f5,#80d8ff);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:pulse 3s ease-in-out infinite;
      text-shadow:none;filter:drop-shadow(0 0 40px rgba(66,165,245,.4));
    }
    @keyframes pulse{
      0%,100%{filter:drop-shadow(0 0 30px rgba(66,165,245,.4))}
      50%{filter:drop-shadow(0 0 60px rgba(66,165,245,.8))}
    }

    /* ── Icon animation ── */
    .icon-wrap{position:relative;z-index:1;font-size:4rem;margin-bottom:.5rem;animation:bounce 2s ease-in-out infinite}
    @keyframes bounce{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-14px)}
    }

    /* ── Text ── */
    .content{position:relative;z-index:1;max-width:520px}
    h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;margin-bottom:.75rem;color:var(--white)}
    p{font-size:1rem;color:rgba(255,255,255,.65);line-height:1.75;margin-bottom:2rem}

    /* ── Search bar ── */
    .search-bar{display:flex;gap:.6rem;margin-bottom:2rem;flex-wrap:wrap;justify-content:center}
    .search-bar input{
      flex:1;min-width:220px;padding:.7rem 1.1rem;border:1.5px solid rgba(255,255,255,.2);
      border-radius:8px;background:rgba(255,255,255,.07);color:var(--white);
      font-size:.95rem;font-family:inherit;outline:none;transition:border-color .2s
    }
    .search-bar input::placeholder{color:rgba(255,255,255,.4)}
    .search-bar input:focus{border-color:#42a5f5}
    .search-bar button{
      padding:.7rem 1.4rem;background:var(--primary);color:#fff;border:none;
      border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;
      transition:background .2s,transform .15s;font-family:inherit
    }
    .search-bar button:hover{background:#1976d2;transform:translateY(-1px)}

    /* ── Quick links ── */
    .quick-links{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;margin-bottom:2.5rem}
    .ql-btn{
      padding:.5rem 1.1rem;border-radius:20px;text-decoration:none;font-size:.85rem;font-weight:600;
      border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);
      transition:all .2s;background:rgba(255,255,255,.06)
    }
    .ql-btn:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.5);color:#fff;transform:translateY(-1px)}

    /* ── Home button ── */
    .home-btn{
      display:inline-block;padding:.85rem 2.2rem;background:linear-gradient(135deg,#1565c0,#1976d2);
      color:#fff;border-radius:10px;text-decoration:none;font-weight:700;font-size:1rem;
      box-shadow:0 4px 20px rgba(21,101,192,.5);transition:transform .2s,box-shadow .2s
    }
    .home-btn:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(21,101,192,.7)}

    /* ── Logo ── */
    .logo-top{position:fixed;top:1.2rem;left:5%;font-size:1.15rem;font-weight:800;color:#fff;text-decoration:none;z-index:10}
    .logo-top span{color:#00897b}

    /* ── Counter ── */
    .redirect-msg{font-size:.8rem;color:rgba(255,255,255,.4);margin-top:1.5rem}
    #countdown{color:#42a5f5;font-weight:700}
  </style>
</head>
<body>

<a href="/" class="logo-top">BizSoft<span>Solutions</span></a>

<!-- Particles -->
<div class="particles" id="particles"></div>

<div class="content">
  <div class="icon-wrap">🔍</div>
  <div class="num-404">404</div>
  <h1>Page Not Found</h1>
  <p>Looks like this page took the day off! The link might be broken, the page may have moved, or it never existed.</p>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search for Vyapar, Biz Analyst…" onkeydown="if(event.key==='Enter')doSearch()"/>
    <button onclick="doSearch()">Search →</button>
  </div>

  <div class="quick-links">
    <a href="/" class="ql-btn">🏠 Home</a>
    <a href="/vyapar/" class="ql-btn">💼 Vyapar</a>
    <a href="/biz-analyst/" class="ql-btn">📊 Biz Analyst</a>
    <a href="/bill-touch/" class="ql-btn">🍽️ Bill Touch</a>
    <a href="/#contact" class="ql-btn">📞 Contact</a>
  </div>

  <a href="/" class="home-btn">← Back to Home</a>

  <p class="redirect-msg">Redirecting to home in <span id="countdown">10</span>s</p>
</div>

<script>
  // ── Particles ───────────────────────────────────────────
  const colors = ["#1565c0","#42a5f5","#00897b","#80d8ff","#1976d2"];
  const container = document.getElementById("particles");
  for (let i = 0; i < 28; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const size = Math.random() * 18 + 6;
    p.style.cssText = [
      `width:${size}px`, `height:${size}px`,
      `left:${Math.random()*100}%`,
      `background:${colors[Math.floor(Math.random()*colors.length)]}`,
      `animation-duration:${Math.random()*12+8}s`,
      `animation-delay:${Math.random()*10}s`
    ].join(";");
    container.appendChild(p);
  }

  // ── Search ──────────────────────────────────────────────
  const pages = [
    { q:["vyapar","billing","gst","invoice"], url:"/vyapar/" },
    { q:["biz analyst","tally","mobile","sales","gps"], url:"/biz-analyst/" },
    { q:["bill touch","restaurant","pos","food","cafe","zomato"], url:"/bill-touch/" },
    { q:["contact","demo","help","expert"], url:"/#contact" },
    { q:["pricing","plan","price","cost"], url:"/vyapar/#pricing" },
  ];
  function doSearch() {
    const q = document.getElementById("searchInput").value.trim().toLowerCase();
    if (!q) return;
    for (const p of pages) {
      if (p.q.some(kw => q.includes(kw))) { window.location.href = p.url; return; }
    }
    window.location.href = "/";
  }

  // ── Auto redirect countdown ──────────────────────────────
  let n = 10;
  const cd = document.getElementById("countdown");
  const t = setInterval(() => {
    cd.textContent = --n;
    if (n <= 0) { clearInterval(t); window.location.href = "/"; }
  }, 1000);

  // Cancel redirect if user interacts
  ["click","keydown","touchstart"].forEach(ev =>
    document.addEventListener(ev, () => { clearInterval(t); document.querySelector(".redirect-msg").style.display="none"; }, { once:true })
  );
</script>
</body>
</html>
